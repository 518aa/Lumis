services:
  - type: web
    name: lumis-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LUMIS_SECRET_KEY
        generateValue: true
      - key: LUMIS_ADMIN_PASSWORD
        sync: false
      - key: LUMIS_API_KEY
        sync: false
      - key: ALIPAY_APP_ID
        sync: false
      - key: ALIPAY_PRIVATE_KEY
        sync: false
      - key: ALIPAY_PUBLIC_KEY
        sync: false
    plan: free
