<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lumis 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,#0B0E2D 0%,#1A1B4B 100%);color:#fff}
.card{background:rgba(30,34,88,0.6);border:1px solid #2A2F6E;border-radius:16px;
  padding:40px 32px;width:360px;text-align:center}
.card h1{font-size:24px;color:#FFD166;margin-bottom:8px;letter-spacing:2px}
.card p{font-size:13px;color:#A0A4D0;margin-bottom:24px}
.input{width:100%;padding:12px 16px;border:1px solid #2A2F6E;border-radius:8px;
  background:rgba(11,14,45,0.8);color:#fff;font-size:14px;outline:none;margin-bottom:16px}
.input:focus{border-color:#00E5FF}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;
  font-weight:bold;cursor:pointer;color:#0B0E2D;
  background:linear-gradient(135deg,#FFD166,#FFB800);transition:opacity .2s}
.btn:hover{opacity:.9}
.error{color:#FF6B6B;font-size:13px;margin-top:12px}
</style>
</head>
<body>
<div class="card">
  <h1>Lumis 管理后台</h1>
  <p>请输入管理员密码</p>
  <form method="POST" action="/admin/login">
    <input class="input" type="password" name="password" placeholder="管理员密码" autofocus required>
    <button class="btn" type="submit">登录</button>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </form>
</div>
</body>
</html>
