<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LUMIS 合伙人登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,#0B0E2D 0%,#1A1B4B 100%);color:#fff}
.login-box{width:100%;max-width:380px;padding:40px 24px}
.login-box h1{text-align:center;font-size:32px;letter-spacing:4px;color:#FFD166;margin-bottom:8px}
.login-box p{text-align:center;color:#A0A4D0;font-size:14px;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;color:#A0A4D0;margin-bottom:6px}
.form-group input{width:100%;padding:12px 16px;border:1px solid #2A2F6E;border-radius:8px;
  background:rgba(30,34,88,0.6);color:#fff;font-size:15px;outline:none;transition:border .2s}
.form-group input:focus{border-color:#00E5FF}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:bold;
  cursor:pointer;background:linear-gradient(135deg,#FF6B35,#FF8F5E);color:#fff;
  box-shadow:0 4px 16px rgba(255,107,53,0.3);transition:transform .2s;margin-top:8px}
.btn:active{transform:scale(0.97)}
.error{color:#FF6B6B;font-size:13px;text-align:center;margin-bottom:16px}
.back{text-align:center;margin-top:20px}
.back a{color:#00E5FF;text-decoration:none;font-size:13px}
</style>
</head>
<body>
<div class="login-box">
  <h1>LUMIS</h1>
  <p>推广合伙人后台</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/api/web/login">
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" name="email" required placeholder="请输入注册邮箱">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" required placeholder="请输入密码">
    </div>
    <button class="btn" type="submit">登 录</button>
  </form>
  <div class="back"><a href="/">返回首页</a></div>
</div>
</body>
</html>
